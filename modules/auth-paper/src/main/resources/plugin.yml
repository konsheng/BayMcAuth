name: "BayMcAuth"
version: "${version}"
main: "com.baymc.auth.paper.BayMcAuthPaperPlugin"
api-version: "26.1.2"
folia-supported: true
authors:
  - "Konsheng"
description: "Velocity 与 Paper/Folia 网络统一认证插件"
commands:
  baymcauth:
    description: "显示帮助并执行 BayMcAuth 认证管理命令"
    usage: "/baymcauth help"
    aliases:
      - "auth"
  register:
    description: "注册当前账号"
    usage: "/register <password> <confirm-password> <invite-code>"
    permission: "baymcauth.register"
  login:
    description: "登录当前账号"
    usage: "/login <password> [totp-code]"
    permission: "baymcauth.login"
  logout:
    description: "登出当前账号"
    usage: "/logout"
    permission: "baymcauth.logout"
  2fa:
    description: "管理当前账号的 TOTP 二次验证"
    usage: "/2fa <setup|confirm|code|disable|status>"
  resetpassword:
    description: "通过 TOTP 重置当前账号密码"
    usage: "/resetpassword <new-password> <confirm-password> <totp-code>"
    permission: "baymcauth.resetpassword"
permissions:
  baymcauth.help:
    description: "查看 BayMcAuth 帮助"
    default: true
  baymcauth.status:
    description: "查看 Paper/Folia 端认证服务状态"
    default: true
  baymcauth.register:
    description: "注册当前账号"
    default: true
  baymcauth.login:
    description: "登录当前账号"
    default: true
  baymcauth.logout:
    description: "登出当前账号"
    default: true
  baymcauth.resetpassword:
    description: "通过 TOTP 重置当前账号密码"
    default: true
  baymcauth.confirm:
    description: "确认当前执行者名下的高风险操作"
    default: true
  baymcauth.password.enable:
    description: "为当前账号启用密码登录"
    default: true
  baymcauth.password.disable:
    description: "关闭当前账号密码登录"
    default: true
  baymcauth.password.change:
    description: "修改当前账号密码"
    default: true
  baymcauth.2fa.setup:
    description: "创建当前账号的 TOTP 待确认密钥"
    default: true
  baymcauth.2fa.confirm:
    description: "确认并启用当前账号 TOTP"
    default: true
  baymcauth.2fa.code:
    description: "提交当前账号 TOTP 验证码"
    default: true
  baymcauth.2fa.disable:
    description: "关闭当前账号 TOTP"
    default: true
  baymcauth.2fa.status:
    description: "查看当前账号 TOTP 状态"
    default: true
  baymcauth.reload:
    description: "重载 Paper/Folia 端配置和语言文件"
    default: "op"
  baymcauth.invite.create:
    description: "创建邀请码"
    default: "op"
  baymcauth.invite.list:
    description: "列出邀请码"
    default: "op"
  baymcauth.invite.export:
    description: "导出邀请码列表"
    default: "op"
  baymcauth.invite.info:
    description: "查看邀请码详情"
    default: "op"
  baymcauth.invite.revoke:
    description: "撤销邀请码"
    default: "op"
  baymcauth.reserve.offline:
    description: "预留无前后缀离线名"
    default: "op"
  baymcauth.reserve.info:
    description: "查看预留名详情"
    default: "op"
  baymcauth.reserve.list:
    description: "列出预留名"
    default: "op"
  baymcauth.reserve.revoke:
    description: "撤销预留名"
    default: "op"
  baymcauth.user.info:
    description: "查看用户基础信息"
    default: "op"
  baymcauth.user.history:
    description: "查看用户历史信息"
    default: "op"
  baymcauth.lock:
    description: "锁定用户账号"
    default: "op"
  baymcauth.unlock:
    description: "解锁用户账号"
    default: "op"
  baymcauth.reset2fa:
    description: "重置玩家 TOTP"
    default: "op"
  baymcauth.velocity.help:
    description: "查看 Velocity 端 BayMcAuth 帮助"
    default: "op"
  baymcauth.velocity.status:
    description: "查看 Velocity 端认证服务状态"
    default: "op"
  baymcauth.velocity.reload:
    description: "重载 Velocity 端配置和语言文件"
    default: "op"
  baymcauth.velocity.affix.status:
    description: "查看 Velocity 端离线名前后缀模式"
    default: "op"
  baymcauth.velocity.affix.reload:
    description: "重新显示 Velocity 端离线名前后缀模式"
    default: "op"
