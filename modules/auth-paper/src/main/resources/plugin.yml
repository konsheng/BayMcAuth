name: "BayMcAuth"
version: "1.0.0-SNAPSHOT"
main: "com.baymc.auth.paper.BayMcAuthPaperPlugin"
api-version: "1.21"
folia-supported: true
authors:
  - "Konsheng"
description: "BayMcAuth authentication plugin for BayMc"
commands:
  baymcauth:
    description: "BayMcAuth main command"
    usage: "/baymcauth help"
    aliases:
      - "auth"
  register:
    description: "Alias of /baymcauth register"
    usage: "/register <password> <confirm-password> <invite-code>"
  login:
    description: "Alias of /baymcauth login"
    usage: "/login <password> [totp-code]"
  logout:
    description: "Alias of /baymcauth logout"
    usage: "/logout"
  2fa:
    description: "Alias of /baymcauth 2fa"
    usage: "/2fa <setup|confirm|code|disable|status>"
  resetpassword:
    description: "Alias of /baymcauth resetpassword"
    usage: "/resetpassword <new-password> <confirm-password> <totp-code>"
permissions:
  baymcauth.user:
    default: true
  baymcauth.admin:
    default: "op"
  baymcauth.reload:
    default: "op"
  baymcauth.invite:
    default: "op"
  baymcauth.reserve:
    default: "op"
  baymcauth.user.info:
    default: "op"
  baymcauth.user.history:
    default: "op"
  baymcauth.lock:
    default: "op"
  baymcauth.unlock:
    default: "op"
  baymcauth.reset2fa:
    default: "op"
  baymcauth.velocity:
    default: "op"
